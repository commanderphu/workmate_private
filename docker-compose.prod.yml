services:
  postgres:
    image: postgres:16-alpine
    container_name: workmate_private_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workmate_private
      POSTGRES_USER: workmate_private
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: workmate_private_redis
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ghcr.io/commanderphu/workmate_private/backend:latest
    container_name: workmate_private_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - uploads:/app/data
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://workmate_private:${POSTGRES_PASSWORD}@postgres:5432/workmate_private
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      DEBUG: "false"
      ENVIRONMENT: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    networks:
      - internal

  celery:
    image: ghcr.io/commanderphu/workmate_private/backend:latest
    container_name: workmate_private_celery
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info
    volumes:
      - uploads:/app/data
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg2://workmate_private:${POSTGRES_PASSWORD}@postgres:5432/workmate_private
      SECRET_KEY: ${SECRET_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
    networks:
      - internal

  celery-beat:
    image: ghcr.io/commanderphu/workmate_private/backend:latest
    container_name: workmate_private_celery_beat
    restart: unless-stopped
    command: celery -A app.celery beat --loglevel=info
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    networks:
      - internal

  frontend:
    image: ghcr.io/commanderphu/workmate_private/frontend:latest
    container_name: workmate_private_ui
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: workmate_private_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

volumes:
  postgres_data:
  uploads:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
