<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Workmate Private App Icon</title>
  <desc id="desc">A warm amber speech-document shape containing a white W and checkmark on a dark rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1E1E"/>
      <stop offset="1" stop-color="#111820"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA1F"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000000" flood-opacity=".30"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="228" fill="url(#bg)"/>
  <rect x="34" y="34" width="956" height="956" rx="226" fill="none" stroke="#FFFFFF" stroke-opacity=".10" stroke-width="4"/>

  <g filter="url(#shadow)">
    <path d="M264 190
             C264 150 296 118 336 118
             H678
             L790 230
             V690
             C790 734 754 770 710 770
             H550
             L466 846
             C442 868 404 850 408 818
             L414 770
             H336
             C296 770 264 738 264 698
             Z"
          fill="url(#amber)"/>
    <path d="M678 118 V214 C678 238 698 258 722 258 H790"
          fill="#FFD27A" opacity=".92"/>
  </g>

  <!-- W -->
  <path d="M342 372
           L402 372
           L448 574
           L506 422
           L566 422
           L622 574
           L672 372
           L734 372
           L654 650
           C648 672 632 686 610 686
           H596
           L536 532
           L476 686
           H452
           C430 686 414 672 408 650
           Z"
        fill="#FFFFFF"/>

  <!-- Checkmark crossing the W -->
  <path d="M570 526 L642 596 L786 406"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="44"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- small mint detail -->
  <rect x="650" y="694" width="74" height="18" rx="9" fill="#10B981"/>
  <rect x="650" y="728" width="48" height="18" rx="9" fill="#10B981" opacity=".82"/>
</svg>